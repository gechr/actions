name: release

on:
  # Reusable entry point for other repos. Callers trigger on tag push and
  # forward their secrets:
  #   uses: gechr/actions/.github/workflows/release.yaml@<ref>
  #   secrets: inherit
  workflow_call:
    inputs:
      language:
        description: "Project language: 'go' or 'rust'."
        type: string
        required: true
      name:
        description: "Binary / Homebrew formula name."
        type: string
        required: true
      desc:
        description: "One-line description for the Homebrew formula."
        type: string
        required: true

permissions: {}

jobs:
  verify-tag:
    permissions:
      contents: read
    # clover: provider=auto
    uses: gechr/actions/.github/workflows/verify-tag.yaml@24aa7833c41452ff05697bdf2dd48f023bcdf33b # v0.2.5

  publish:
    needs: verify-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    steps:
      - name: Checkout repository
        # clover: provider=auto
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Mint homebrew-tap token
        id: app-token
        # clover: provider=auto
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASER_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          repositories: homebrew-tap
          permission-contents: write

      - name: Mint scoop-bucket token
        id: scoop-token
        # clover: provider=auto
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASER_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          repositories: scoop-bucket
          permission-contents: write

      - name: Set up Go
        if: inputs.language == 'go'
        # clover: provider=auto
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install cargo-zigbuild
        if: inputs.language == 'rust'
        # clover: provider=auto
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-zigbuild

      - name: Set up Zig
        if: inputs.language == 'rust'
        # clover: provider=auto
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.13.0
          use-cache: false

      - name: Run GoReleaser
        # clover: provider=auto
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SCOOP_GITHUB_TOKEN: ${{ steps.scoop-token.outputs.token }}

      - name: Publish Homebrew formula (Go)
        if: inputs.language == 'go'
        # clover: provider=auto
        uses: gechr/homebrew-publish-formula@04c96853dce59cfbfca97503d2cc625cb3321cee # v1.0.5
        with:
          name: ${{ inputs.name }}
          desc: ${{ inputs.desc }}
          token: ${{ steps.app-token.outputs.token }}
          version: ${{ github.ref_name }}
          homepage: https://github.com/${{ github.repository }}

      - name: Publish Homebrew formula (Rust)
        if: inputs.language == 'rust'
        # clover: provider=auto
        uses: gechr/homebrew-publish-formula@04c96853dce59cfbfca97503d2cc625cb3321cee # v1.0.5
        with:
          name: ${{ inputs.name }}
          desc: ${{ inputs.desc }}
          token: ${{ steps.app-token.outputs.token }}
          version: ${{ github.ref_name }}
          homepage: https://github.com/${{ github.repository }}
          head-depends-on: rust
          head-build-binary: target/release/${{ inputs.name }}
          completion-args: "--completions"
          shell-parameter-format: ""
