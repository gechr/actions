name: release-notes

on:
  # Reusable entry point for library repos that publish a GitHub Release with
  # an auto-generated changelog (no binaries). Callers trigger on tag push:
  #   uses: gechr/actions/.github/workflows/release-notes.yaml@<ref>
  workflow_call:

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        # clover: provider=auto
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for existing tags on this commit
        env:
          TAG: ${{ github.ref_name }}
        run: |
          COMMIT=$(git rev-list -n1 "$TAG")
          OTHER_TAGS=$(git tag --points-at "$COMMIT" | grep -v "^${TAG}$" | grep '^v[0-9]' || true)
          if [ -n "$OTHER_TAGS" ]; then
            echo "::error::Commit $COMMIT already has version tag(s): $OTHER_TAGS"
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ]; then
            NOTES=$(git log --oneline --format="- %h %s" "$TAG")
          else
            NOTES=$(git log --oneline --format="- %h %s" "${PREV_TAG}..${TAG}")
          fi
          NOTES=$(printf "### Changes\n\n%s" "$NOTES")
          gh release create --repo="$GH_REPO" "$TAG" --notes "$NOTES"
