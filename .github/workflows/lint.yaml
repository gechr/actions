name: lint

on:
  # Reusable entry point for other repos:
  #   uses: gechr/actions/.github/workflows/lint.yaml@<ref>
  workflow_call:
    inputs:
      language:
        description: "Project language: 'go' or 'rust'."
        type: string
        required: true

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # clover: provider=auto
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Go projects lint against the toolchain pinned in go.mod. Rust projects
      # rely on the toolchain preinstalled on the runner, so no setup is needed.
      - name: Set up Go
        if: inputs.language == 'go'
        # clover: provider=auto
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Lint
        run: make lint
