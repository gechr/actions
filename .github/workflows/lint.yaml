name: lint

on:
  # Reusable entry point for other repos:
  #   uses: gechr/actions/.github/workflows/lint.yaml@<ref>
  workflow_call:
    inputs:
      language:
        description: "Project language: 'go' or 'rust'."
        type: string
        required: true

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # clover: provider=auto
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Go projects lint against the toolchain pinned in go.mod. Rust projects
      # rely on the toolchain preinstalled on the runner, so no setup is needed.
      - name: Set up Go
        if: inputs.language == 'go'
        # clover: provider=auto
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Lint
        run: make lint
