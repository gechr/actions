name: zizmor

on: # zizmor: ignore[concurrency-limits] reusable; callers define concurrency
  push:
    branches:
      - main
  pull_request:

  # Reusable entry point for other repos:
  #   uses: gechr/actions/.github/workflows/zizmor.yaml@<ref>
  workflow_call:
    inputs:
      advanced-security:
        description: Upload findings to GitHub Advanced Security (code scanning).
        type: string
        default: "true"
      config:
        description: Path to custom zizmor config file.
        type: string
        default: ""
      min-severity:
        description: Threshold for findings (anything below is ignored).
        type: string
        default: medium
      persona:
        description: Posture to apply audits (regular | pedantic | auditor).
        type: string
        default: pedantic
      version:
        description: Version of zizmor to use.
        type: string
        default: latest

permissions: {}

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Stage a default config under .git/ so the workspace stays clean for
      # downstream steps. Only written when the caller didn't supply one.
      - name: Write default zizmor config
        if: inputs.config == ''
        run: |
          cat > .git/zizmor.yml << 'EOF'
          rules:
            undocumented-permissions:
              disable: true
            unpinned-uses:
              config:
                policies:
                  "*": hash-pin
          EOF

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: ${{ inputs.advanced-security || 'true' }}
          config: ${{ inputs.config || '.git/zizmor.yml' }}
          inputs: ./.github/
          min-severity: ${{ inputs.min-severity || 'medium' }}
          persona: ${{ inputs.persona || 'pedantic' }}
          version: ${{ inputs.version || 'latest' }}
